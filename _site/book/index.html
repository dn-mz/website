        <style>
          /* Always show right nav, hide hamburger everywhere */
          .nav-links { display: flex !important; gap: 16px; align-items: center; }
          .menu-button { display: none !important; }

          @media (max-width: 480px) {
            .nav-links { gap: 8px; }
            .nav-link { font-size: 12px; }
            .brand-text { font-size: 15px; }
          }

          /* Brand wrapper */
          .brand-wrapper {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 2px;
          }

          /* Brand text — links to home */
          .brand-text {
            font-weight: 800;
            letter-spacing: -0.02em;
            font-size: 18px;
            color: inherit;
            text-decoration: none;
            transition: opacity 0.15s ease;
          }

          .brand-text:hover {
            opacity: 0.65;
          }

          /* Chevron button — toggles dropdown */
          .brand-chevron-btn {
            background: var(--muted);
            border: none;
            padding: 3px 3px 0;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            color: inherit;
            border-radius: 4px;
            transition: background 0.15s ease;
            line-height: 1;
          }

          .brand-chevron-btn:hover {
            background: var(--border);
          }

          .brand-chevron {
            width: 21px;
            height: 21px;
            transition: transform 0.2s ease;
            opacity: 0.7;
            display: block;
          }

          .brand-wrapper.open .brand-chevron {
            transform: rotate(180deg);
            opacity: 0.85;
          }

          /* Dropdown */
          .brand-dropdown {
            display: none;
            position: absolute;
            top: calc(100% + 10px);
            left: 0;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            min-width: 140px;
            box-shadow: 0 8px 24px oklch(0% 0 0 / 0.08);
            overflow: hidden;
            z-index: 100;
            animation: fadeUp 0.15s ease both;
          }

          .brand-wrapper.open .brand-dropdown {
            display: block;
          }

          .brand-dropdown a {
            display: block;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 600;
            color: oklch(45% 0 0);
            transition: background 0.15s ease, color 0.15s ease;
            border-bottom: 1px solid var(--border);
          }

          .brand-dropdown a:last-child {
            border-bottom: none;
          }

          .brand-dropdown a:hover {
            background: var(--muted);
            color: var(--fg);
          }
        </style>

  <script>
    (function () {
      const wrapper = document.getElementById("brandWrapper");
      const btn = document.getElementById("brandBtn");
      if (!wrapper || !btn) return;

      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        const isOpen = wrapper.classList.contains("open");
        wrapper.classList.toggle("open", !isOpen);
        btn.setAttribute("aria-expanded", String(!isOpen));
      });

      document.addEventListener("click", (e) => {
        if (!wrapper.contains(e.target)) {
          wrapper.classList.remove("open");
          btn.setAttribute("aria-expanded", "false");
        }
      });

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          wrapper.classList.remove("open");
          btn.setAttribute("aria-expanded", "false");
        }
      });
    })();
  </script>
